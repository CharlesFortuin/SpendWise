{% extends "base.html" %}

{% block content %}

<h2>Edit Transaction</h2>

<form method="POST">

    <p>
        <label>Title</label><br>
        <input type="text"
               name="title"
               value="{{ transaction['title'] }}"
               required>
    </p>

    <p>
        <label>Amount</label><br>
        <input type="number"
               step="0.01"
               name="amount"
               value="{{ transaction['amount'] }}"
               required>
    </p>

    <p>
        <label>Category</label><br>
        <select name="category" required>
            {% for category in categories %}
            <option value="{{ category }}"
                    {% if category == transaction["category"] %}selected{% endif %}>
                    {{ category }}
            </option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label>Type</label><br>

        <select name="type" required>
            {% for transaction_type in transaction_types %}
            <option value="{{ transaction_type }}"
                    {% if transaction_type == transaction['type'] %}selected{% endif %}>
                    {{ transaction_type }}
            </option>
            {% endfor %}
        </select>

    </p>

    <p>
        <label>Date</label><br>
        <input type="date"
               name="date"
               value="{{ transaction['date'] }}"
               required>
    </p>

    <button type="submit">
        Save Changes
    </button>

</form>

{% endblock %}
