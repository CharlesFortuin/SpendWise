{% extends "base.html" %}

{% block content %}

<h2>Edit Transaction</h2>

<form method="POST">

    <p>
        <label>Title</label><br>
        <input type="text"
               name="title"
               value="{{ transaction['title'] }}"
               required>
    </p>

    <p>
        <label>Amount</label><br>
        <input type="number"
               step="0.01"
               name="amount"
               value="{{ transaction['amount'] }}"
               required>
    </p>

    <p>
        <label>Category</label><br>
        <input type="text"
               name="category"
               value="{{ transaction['category'] }}"
               required>
    </p>

    <p>
        <label>Type</label><br>

        <select name="type">

            <option value="Income"
                {% if transaction["type"] == "Income" %}selected{% endif %}>
                Income
            </option>

            <option value="Expense"
                {% if transaction["type"] == "Expense" %}selected{% endif %}>
                Expense
            </option>

        </select>

    </p>

    <p>
        <label>Date</label><br>
        <input type="date"
               name="date"
               value="{{ transaction['date'] }}"
               required>
    </p>

    <button type="submit">
        Save Changes
    </button>

</form>

{% endblock %}
